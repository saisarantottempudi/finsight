name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-anyio anyio ruff bandit

      - name: Lint (ruff)
        run: ruff check app/ --ignore E501

      - name: SAST (bandit)
        run: bandit -r app/ -ll --exclude app/db/migrations

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://x:x@localhost/x
          SECRET_KEY: ci-test-secret
          MODEL_PATH: /tmp/ci_model.pkl

  build-scan:
    name: Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        run: docker build -t finsight-app:${{ github.sha }} ./app

      - name: Trivy scan (CRITICAL only — fail on found)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: finsight-app:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Build dashboard image
        run: docker build -t finsight-dashboard:${{ github.sha }} ./dashboard

      - name: Build ingestion image
        run: docker build -t finsight-ingestion:${{ github.sha }} ./data-ingestion
